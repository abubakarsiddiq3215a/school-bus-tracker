<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="School Bus Tracker — Real-time school bus tracking for parents, drivers, and administrators." />
  <title>School Bus Tracker — Login</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚌</text></svg>" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Toast container for notifications -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Loader -->
  <div id="loader" class="loader-overlay hidden">
    <div class="spinner"></div>
  </div>

  <!-- Login Form -->
  <div class="login-wrapper">
    <div class="card login-card">
      <div class="logo-section">
        <div class="bus-icon">🚌</div>
        <h1>School Bus Tracker</h1>
        <p>Track your child's bus in real-time</p>
      </div>

      <form id="login-form" autocomplete="on">
        <div class="form-group">
          <label for="login-email">Email Address</label>
          <input
            type="email"
            id="login-email"
            class="form-control"
            placeholder="you@example.com"
            required
            autocomplete="email"
          />
        </div>

        <div class="form-group">
          <label for="login-password">Password</label>
          <input
            type="password"
            id="login-password"
            class="form-control"
            placeholder="••••••••"
            required
            autocomplete="current-password"
          />
        </div>

        <button type="submit" id="login-btn" class="btn btn-primary btn-lg">
          🔐 Sign In
        </button>
      </form>

      <div class="login-footer">
        Secured with Firebase Authentication
      </div>
    </div>
  </div>

  <!-- Firebase SDKs (compat for simplicity) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="app.js"></script>
  <script>
    // ──── Login Page Logic ────────────────────────────────────────
    (function () {
      const form = document.getElementById('login-form');
      const emailInput = document.getElementById('login-email');
      const passwordInput = document.getElementById('login-password');

      // If user is already logged in, redirect to their dashboard
      firebase.auth().onAuthStateChanged(async (user) => {
        if (user) {
          showLoader();
          try {
            const role = await getUserRole(user.uid);
            redirectByRole(role);
          } catch (e) {
            hideLoader();
          }
        }
      });

      // Handle login form submit
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = emailInput.value.trim();
        const password = passwordInput.value;

        if (!email || !password) {
          showToast('Please fill in all fields.', 'warning');
          return;
        }

        showLoader();
        try {
          // Sign in with Firebase Auth
          const cred = await firebase.auth().signInWithEmailAndPassword(email, password);
          const role = await getUserRole(cred.user.uid);
          showToast('Login successful!', 'success');

          // Small delay so toast is visible
          setTimeout(() => redirectByRole(role), 600);
        } catch (err) {
          hideLoader();
          // Friendly error messages
          const msg = getFriendlyAuthError(err.code);
          showToast(msg, 'error');
        }
      });

      /**
       * Get user role from Firestore
       */
      async function getUserRole(uid) {
        const doc = await db.collection('users').doc(uid).get();
        if (!doc.exists) throw new Error('User profile not found.');
        return doc.data().role;
      }

      /**
       * Redirect user based on role
       */
      function redirectByRole(role) {
        switch (role) {
          case 'driver': window.location.href = 'driver.html'; break;
          case 'parent': window.location.href = 'parent.html'; break;
          case 'admin':  window.location.href = 'admin.html';  break;
          default:
            hideLoader();
            showToast('Unknown user role. Contact admin.', 'error');
        }
      }

      /**
       * Return friendly error message for Firebase Auth errors
       */
      function getFriendlyAuthError(code) {
        const map = {
          'auth/user-not-found': 'No account found with this email.',
          'auth/wrong-password': 'Incorrect password. Try again.',
          'auth/invalid-email': 'Please enter a valid email address.',
          'auth/user-disabled': 'This account has been disabled.',
          'auth/too-many-requests': 'Too many attempts. Please wait a moment.',
          'auth/invalid-credential': 'Invalid email or password.',
          'auth/network-request-failed': 'Network error. Check your connection.',
        };
        return map[code] || 'Login failed. Please try again.';
      }
    })();
  </script>
</body>
</html>
